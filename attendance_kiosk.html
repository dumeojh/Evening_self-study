<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안성여고 자기주도학습 출입 키오스크</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase_config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 50px; }
        .status-box { font-size: 24px; color: blue; font-weight: bold; margin-bottom: 20px; }
        input { padding: 10px; font-size: 18px; margin: 5px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; }
        #late-warning { color: red; display: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>자기주도학습 출입 시스템</h1>
    <div id="current-status" class="status-box">현재 상태를 계산 중입니다...</div>
    
    <div id="input-area">
        <input type="text" id="studentId" placeholder="학번 (예: 10101)">
        <input type="text" id="studentName" placeholder="이름 (예: 홍길동)">
        <button onclick="processAttendance()">확인 (스캔)</button>
    </div>

    <div id="late-warning">
        <p>현재 지각 입실입니다. 확인 버튼을 눌러주세요.</p>
        <button onclick="confirmLateAttendance()" style="background-color: #ffcccc;">지각 입실 확인</button>
    </div>

    <script>
        // 전역 변수: 현재 어떤 타임인지, 학생이 입력한 정보 임시 저장
        let currentPeriod = "대기중"; 
        let isLate = false;
        let tempStudentInfo = {};

        // 1. 현재 시간을 계산하여 자동으로 어떤 타임인지 판단하는 함수
        function updateTimeStatus() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            // 계산을 쉽게 하기 위해 현재 시간을 '분' 단위로 바꿉니다 (예: 16시 30분 = 16 * 60 + 30 = 990분)
            const currentTimeInMinutes = hours * 60 + minutes; 

            const statusDiv = document.getElementById('current-status');

            // 시간 설정 (환경설정에서 나중에 불러오도록 수정 가능, 현재는 고정값)
            // 1타임: 16:30 ~ 18:10 (16:20부터 활성화)
            if (currentTimeInMinutes >= (16*60 + 20) && currentTimeInMinutes < (18*60 + 10)) {
                currentPeriod = "1타임";
                // 16:35분이 넘어가면 지각으로 간주 (5분 유예)
                isLate = currentTimeInMinutes > (16*60 + 35); 
            } 
            // 2타임: 18:50 ~ 20:00
            else if (currentTimeInMinutes >= (18*60 + 50) && currentTimeInMinutes < (20*60 + 0)) {
                currentPeriod = "2타임";
                isLate = currentTimeInMinutes > (18*60 + 55);
            }
            // 3타임: 20:10 ~ 21:30
            else if (currentTimeInMinutes >= (20*60 + 10) && currentTimeInMinutes < (21*60 + 30)) {
                currentPeriod = "3타임";
                isLate = currentTimeInMinutes > (20*60 + 15);
            } else {
                currentPeriod = "휴식/종료";
                isLate = false;
            }

            statusDiv.innerText = `현재 진행: [${currentPeriod}]`;
        }

        // 1초마다 시간 상태 업데이트
        setInterval(updateTimeStatus, 1000); 

        // 2. 학생이 학번과 이름을 입력하고 버튼을 눌렀을 때 실행되는 함수
        function processAttendance() {
            const stuId = document.getElementById('studentId').value.trim();
            const stuName = document.getElementById('studentName').value.trim();

            if(!stuId || !stuName) {
                alert("학번과 이름을 모두 입력해주세요.");
                return;
            }

            // TODO: 나중에 Settings의 기초 명단(DB)과 이름이 진짜 일치하는지 비교하는 로직이 추가될 부분입니다.
            // 지금은 통과되었다고 가정하고 진행합니다.

            tempStudentInfo = { id: stuId, name: stuName, period: currentPeriod };

            if(isLate) {
                // 지각이면 바로 DB에 저장하지 않고 지각 경고창을 띄워 학생이 직접 누르게 합니다.
                document.getElementById('input-area').style.display = 'none';
                document.getElementById('late-warning').style.display = 'block';
            } else {
                // 지각이 아니면 정상 입실 처리
                saveToDatabase(tempStudentInfo.id, tempStudentInfo.name, "정상입실");
            }
        }

        // 3. 학생이 "지각 입실 확인" 버튼을 눌렀을 때 실행
        function confirmLateAttendance() {
            saveToDatabase(tempStudentInfo.id, tempStudentInfo.name, "지각");
            
            // 화면 원상복구
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('late-warning').style.display = 'none';
            document.getElementById('studentId').value = '';
            document.getElementById('studentName').value = '';
        }

        // 4. Firebase DB에 데이터를 저장하는 함수
        function saveToDatabase(id, name, status) {
            const today = new Date().toISOString().split('T')[0]; // "2026-04-18" 형식
            
            // Firebase의 'attendance/날짜/학번' 위치에 데이터 저장
            db.ref('attendance/' + today + '/' + id).set({
                name: name,
                status: status, // "정상입실" 또는 "지각"
                period: currentPeriod,
                timestamp: new Date().toLocaleTimeString()
            }).then(() => {
                // 저장이 성공적으로 완료되면 알림
                alert(`${name} 학생, ${status} 처리되었습니다.`);
                // 입력창 초기화
                document.getElementById('studentId').value = '';
                document.getElementById('studentName').value = '';
            }).catch((error) => {
                alert("저장 중 오류가 발생했습니다: " + error);
            });
        }
    </script>
</body>
</html>
