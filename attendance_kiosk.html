<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>키오스크 - 입퇴실 처리</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase_config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 50px; background: #e0f7fa;}
        input { padding: 15px; font-size: 20px; width: 80%; max-width: 300px; margin: 10px; display:block; margin-left:auto; margin-right:auto; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00796b; color: white; border: none; border-radius: 8px;}
        #late-warning { display: none; background: #ffebee; padding: 20px; border: 2px solid red; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>출입 스캐너</h1>
    <h2 id="time-display" style="color: #00796b;">00:00</h2>
    
    <div id="input-area">
        <input type="number" id="stuId" placeholder="학번 5자리 (예: 30101)">
        <input type="text" id="stuName" placeholder="이름 (본인 확인용)">
        <button onclick="checkStudent()">입력 (스캔)</button>
    </div>

    <div id="late-warning">
        <h2 style="color:red;">🚨 지각 입실입니다</h2>
        <p>확인 버튼을 눌러야 처리가 완료됩니다.</p>
        <button onclick="confirmLate()" style="background: red;">지각 입실 확인</button>
    </div>

    <script>
        let tempId = '', tempName = '';

        // 시계 업데이트
        setInterval(() => {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString();
        }, 1000);

        function checkStudent() {
            tempId = document.getElementById('stuId').value.trim();
            tempName = document.getElementById('stuName').value.trim();
            if(!tempId || !tempName) return alert("학번과 이름을 모두 입력하세요.");

            // DB 기초명단과 대조
            db.ref('settings/roster/' + tempId).once('value').then(snapshot => {
                if(snapshot.exists() && snapshot.val().name === tempName) {
                    // TODO: 실제 시간 연동 로직 (현재는 테스트를 위해 무조건 지각으로 분기하는 예시)
                    const isLate = confirm("현재 지각 처리 시간을 넘겼습니까? (테스트용)");
                    
                    if(isLate) {
                        document.getElementById('input-area').style.display = 'none';
                        document.getElementById('late-warning').style.display = 'block';
                    } else {
                        saveData("정상입실");
                    }
                } else {
                    alert("등록되지 않은 학번이거나 이름이 일치하지 않습니다.");
                }
            });
        }

        function confirmLate() { saveData("지각"); }

        function saveData(status) {
            const today = new Date().toISOString().split('T')[0];
            db.ref('attendance/' + today + '/' + tempId).set({
                name: tempName, status: status, time: new Date().toLocaleTimeString()
            }).then(() => {
                alert(tempName + " 학생 " + status + " 처리 완료.");
                location.reload(); // 화면 초기화
            });
        }
    </script>
</body>
</html>
