<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>환경설정 - 자기주도학습</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase_config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; }
        h1, h2 { color: #333; }
        #login-screen { text-align: center; margin-top: 100px; }
        #login-screen input { padding: 10px; font-size: 18px; width: 200px; text-align: center; }
        #login-screen button { padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #4CAF50; color: white; border: none; }
        #settings-main { display: none; max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .tab-menu { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .tab-menu button { padding: 10px 15px; cursor: pointer; border: 1px solid #ccc; background: #eee; font-weight: bold; }
        .tab-menu button.active { background: #4CAF50; color: white; border-color: #4CAF50; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input[type="text"], input[type="time"], input[type="datetime-local"], input[type="number"] { padding: 8px; width: 200px; }
        textarea { width: 100%; height: 100px; padding: 10px; box-sizing: border-box; }
        .save-btn { background-color: #2196F3; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; }
        .delete-btn { background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .search-box { margin-bottom: 15px; width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; }
        .seat-grid { display: grid; gap: 5px; margin-top: 10px; justify-content: start; }
        .seat { width: 40px; height: 40px; background-color: #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
        .seat.active { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2>관리자 설정 접근3</h2>
        <input type="password" id="admin-pw" placeholder="비밀번호(1234)">
        <button onclick="checkPassword()">확인</button>
    </div>

    <div id="settings-main">
        <h1>⚙️ 환경설정</h1>
        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('tab-roster')">1. 기초명단 관리</button>
            <button class="tab-btn" onclick="openTab('tab-time')">2. 시간 설정</button>
            <button class="tab-btn" onclick="openTab('tab-seat')">3. 좌석 설계</button>
            <button class="tab-btn" onclick="openTab('tab-period')">4. 신청 기간</button>
            <button class="tab-btn" onclick="openTab('tab-view')">5. 전체 명단 조회</button>
        </div>

        <div id="tab-roster" class="tab-content active">
            <h2>기초명단 일괄 등록</h2>
            <div style="background: #e7f3ff; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                <p><strong>CSV 파일 업로드 (학년, 반, 번호, 성명, 전화번호)</strong></p>
                <input type="file" id="roster-file" accept=".csv" style="margin-bottom: 10px;"><br>
                <button class="save-btn" style="background-color: #4CAF50;" onclick="processFile()">파일 업로드 및 저장</button>
            </div>
            <p><strong>또는 엑셀에서 직접 붙여넣기</strong></p>
            <textarea id="roster-input" placeholder="학년	반	번호	성명	전화번호 양식으로 붙여넣으세요..."></textarea>
            <button class="save-btn" onclick="processRoster()">직접 붙여넣기 저장</button>
            <div id="roster-result" style="margin-top:10px; color:blue; font-weight:bold;"></div>
        </div>

        <div id="tab-view" class="tab-content">
            <h2>전체 등록 명단 조회</h2>
            <input type="text" id="roster-search" class="search-box" placeholder="학번 또는 이름으로 검색..." onkeyup="filterRoster()">
            <table>
                <thead><tr><th>학번</th><th>이름</th><th>전화번호</th><th>관리</th></tr></thead>
                <tbody id="roster-table-body"></tbody>
            </table>
        </div>

        <div id="tab-time" class="tab-content">
            <h2>지각 허용 시간 설정</h2>
            <div class="form-group"><label>지각 허용(분) :</label><input type="number" id="grace-period" value="5"></div>
            <button class="save-btn" onclick="saveSettings('time')">저장</button>
        </div>

        <div id="tab-seat" class="tab-content">
            <h2>실별 좌석 설계</h2>
            <select id="room-select" onchange="selectRoom(this.value)">
                <option value="room1">1실</option><option value="room2">2실</option>
            </select>
            <br><br>
            행: <input type="number" id="rows" value="5" style="width:50px;"> 열: <input type="number" id="cols" value="6" style="width:50px;">
            <button onclick="generateGrid()">도면 생성</button>
            <div id="seat-map" class="seat-grid"></div>
            <button class="save-btn" onclick="saveSettings('seat')">도면 저장</button>
        </div>

        <div id="tab-period" class="tab-content">
            <h2>학생 신청 활성화 기간</h2>
            시작: <input type="datetime-local" id="apply-start"><br><br>
            종료: <input type="datetime-local" id="apply-end"><br>
            <button class="save-btn" onclick="saveSettings('period')">기간 저장</button>
        </div>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('admin-pw').value === '1234') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('settings-main').style.display = 'block';
            } else alert('비밀번호 오류');
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            if(tabId === 'tab-view') loadRoster();
        }

        function processFile() {
            const file = document.getElementById('roster-file').files[0];
            const resultDiv = document.getElementById('roster-result');
            if (!file) return alert("파일을 선택하세요.");
            resultDiv.style.color = "#ff9800";
            resultDiv.innerText = "⏳ 파일을 읽어오는 중...";
            const reader = new FileReader();
            reader.onload = e => handleDataProcessing(e.target.result);
            reader.readAsText(file, "EUC-KR");
        }

        function processRoster() { handleDataProcessing(document.getElementById('roster-input').value); }

// --- 2. 데이터 정제 및 DB 저장 진행 (어떤 줄바꿈이든 완벽 인식 + 대량 전송) ---
function handleDataProcessing(rawData) {
    const resultDiv = document.getElementById('roster-result');
    
    // 🌟 핵심 수정: 윈도우, 맥(Mac), 구형 엑셀 등 어떤 줄바꿈 기호라도 완벽하게 쪼개도록 업그레이드!
    const rows = rawData.split(/\r?\n|\r/);
    
    let successCount = 0; 
    let failCount = 0; 
    let updates = {}; 
    let firstError = "";

    rows.forEach((row, index) => {
        if (index === 0) return; // 첫 줄(제목) 무시
        if (!row.trim()) return; // 빈 줄 무시

        const cols = row.split(/[\t, ]+/).filter(Boolean);
        
        if (cols.length < 4) {
            failCount++;
            if(!firstError) firstError = `${index + 1}번째 줄: 항목 부족`;
            return;
        }

        const grade = cols[0].trim();
        const classNum = cols[1].trim();
        const studentNum = cols[2].trim();

        if (isNaN(grade) || isNaN(classNum) || isNaN(studentNum)) {
            failCount++;
            if(!firstError) firstError = `${index + 1}번째 줄: 학년/반/번호는 숫자여야 함`;
            return;
        }

        const cleanName = cols[3].replace(/[\s!@#$%^&*(),.?":{}|<>]/g, '');
        const phone = cols[4] ? cols[4].trim() : "없음";
        
        const studentId = `${grade}${classNum.padStart(2, '0')}${studentNum.padStart(2, '0')}`;

        updates['settings/roster/' + studentId] = { 
            name: cleanName, 
            phone: phone, 
            grade: grade 
        };
        successCount++;
    });

    if (successCount === 0) {
        resultDiv.style.color = "red";
        resultDiv.innerHTML = `❌ 실패: 저장할 유효한 학생 데이터가 없습니다.<br><small>(${firstError || '내용이 비어있습니다'})</small>`;
        return;
    }

    // --- 대량 데이터 분할 전송 로직 (120명 멈춤 방지) ---
    const entries = Object.entries(updates);
    const totalCount = entries.length;
    let completedCount = 0;
    const chunkSize = 10; // 10명씩 안전하게 전송

    resultDiv.style.color = "blue";
    resultDiv.innerText = `⏳ 서버 전송 준비 중... (총 ${totalCount}명)`;

    function uploadChunk(startIndex) {
        const chunk = entries.slice(startIndex, startIndex + chunkSize);
        if (chunk.length === 0) {
            resultDiv.style.color = "green";
            const failMessage = failCount > 0 ? `<br><small style="color:orange;">⚠️ ${failCount}건 제외됨 (${firstError})</small>` : '';
            resultDiv.innerHTML = `✅ 성공: 총 ${totalCount}명의 학생 명단이 등록되었습니다! ${failMessage}`;
            alert(`${totalCount}명 저장 완료!`);
            if (document.getElementById('tab-view').classList.contains('active')) loadRoster();
            return;
        }

        const chunkUpdates = {};
        chunk.forEach(([key, value]) => chunkUpdates[key] = value);

        db.ref().update(chunkUpdates)
            .then(() => {
                completedCount += chunk.length;
                resultDiv.innerText = `⏳ 저장 중... (${completedCount} / ${totalCount}명 완료)`;
                // 0.2초 쉬고 다음 10명 전송
                setTimeout(() => uploadChunk(startIndex + chunkSize), 200);
            })
            .catch(error => {
                resultDiv.style.color = "red";
                resultDiv.innerHTML = `❌ 저장 실패 (${completedCount}명 이후 멈춤): ${error.message}`;
            });
    }

    uploadChunk(0);
}




        
        function loadRoster() {
            const body = document.getElementById('roster-table-body');
            body.innerHTML = '<tr><td colspan="4">불러오는 중...</td></tr>';
            db.ref('settings/roster').once('value').then(snap => {
                body.innerHTML = '';
                const data = snap.val();
                if(data) {
                    Object.keys(data).sort().forEach(id => {
                        body.innerHTML += `<tr><td>${id}</td><td>${data[id].name}</td><td>${data[id].phone}</td><td><button class="delete-btn" onclick="deleteStudent('${id}')">삭제</button></td></tr>`;
                    });
                } else body.innerHTML = '<tr><td colspan="4">데이터 없음</td></tr>';
            });
        }

        function filterRoster() {
            const val = document.getElementById('roster-search').value.toLowerCase();
            const rows = document.getElementById('roster-table-body').rows;
            for(let r of rows) {
                r.style.display = (r.cells[0].innerText.includes(val) || r.cells[1].innerText.includes(val)) ? "" : "none";
            }
        }

        function deleteStudent(id) {
            if(confirm(`${id} 학생을 삭제할까요?`)) db.ref('settings/roster/'+id).remove().then(loadRoster);
        }

        let currentRoom = 'room1';
        function selectRoom(r) { currentRoom = r; }
        function generateGrid() {
            const rs = document.getElementById('rows').value, cs = document.getElementById('cols').value;
            const map = document.getElementById('seat-map');
            map.style.gridTemplateColumns = `repeat(${cs}, 40px)`;
            map.innerHTML = '';
            for(let i=1; i<=rs*cs; i++) {
                let s = document.createElement('div');
                s.className = 'seat active'; s.innerText = i;
                s.onclick = function() { this.classList.toggle('active'); this.innerText = this.classList.contains('active') ? i : 'X'; };
                map.appendChild(s);
            }
        }

        function saveSettings(type) {
            let path = type === 'time' ? 'settings/time' : (type === 'period' ? 'settings/application_period' : 'settings/seats/'+currentRoom);
            let val = {};
            if(type === 'time') val = { grace_period: document.getElementById('grace-period').value };
            else if(type === 'period') val = { start: document.getElementById('apply-start').value, end: document.getElementById('apply-end').value };
            else val = { layout: Array.from(document.querySelectorAll('.seat')).map(s => ({ id: s.innerText, isActive: s.classList.contains('active') })) };
            db.ref(path).set(val).then(() => alert('저장 완료!'));
        }
    </script>
</body>
</html>
