<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 설정 - 안성여고 야자시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase_config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid #ddd; background: #f9f9f9; font-weight: bold; border-radius: 5px; }
        .tab-btn.active { background: #4CAF50; color: white; border-color: #4CAF50; }
        .tab-content { display: none; padding: 20px 0; }
        .tab-content.active { display: block; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        .save-btn { background-color: #2196F3; color: white; padding: 12px 25px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 15px; }
        .save-btn:hover { background-color: #1976D2; }
        #status-msg { margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚙️ 야간자기주도학습 환경설정</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="openTab('tab-upload')">1. 명단 일괄 교체</button>
        <button class="tab-btn" onclick="openTab('tab-view')">2. 전체 명단 확인</button>
    </div>

    <div id="tab-upload" class="tab-content active">
        <h3>기초명단 일괄 등록 (기존 자료 삭제 후 교체)</h3>
        <p style="color: #666;">※ 엑셀에서 <b>[학년, 반, 번호, 성명, 전화번호]</b> 열을 복사하여 아래에 붙여넣으세요.<br>
        ※ 첫 줄(제목 줄)은 자동으로 제외됩니다.</p>
        <textarea id="roster-input" placeholder="여기에 엑셀 데이터를 붙여넣으세요..."></textarea>
        <button class="save-btn" onclick="handleUpload()">새 명단으로 전체 교체하기</button>
        <div id="status-msg"></div>
    </div>

    <div id="tab-view" class="tab-content">
        <h3>현재 등록된 학생 명단</h3>
        <input type="text" id="search-input" class="search-box" placeholder="이름 또는 학번 검색..." onkeyup="filterTable()">
        <table>
            <thead>
                <tr>
                    <th>학번</th>
                    <th>이름</th>
                    <th>전화번호</th>
                </tr>
            </thead>
            <tbody id="roster-list"></tbody>
        </table>
    </div>
</div>

<script>
    // 탭 전환 함수
    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'tab-view') loadRoster();
    }

    // 명단 업로드 및 교체 로직
    async function handleUpload() {
        const input = document.getElementById('roster-input').value;
        const msg = document.getElementById('status-msg');
        
        if(!input.trim()) return alert("데이터를 입력해주세요.");

        // 1. 데이터 파싱
        const rows = input.split(/\r?\n|\r/);
        let updates = {};
        let count = 0;

        rows.forEach((row, index) => {
            if(index === 0 || !row.trim()) return; // 첫줄(제목) 및 빈줄 패스
            const cols = row.split(/[\t, ]+/).filter(Boolean);
            if(cols.length >= 4) {
                const grade = cols[0].trim();
                const cls = cols[1].trim().padStart(2, '0');
                const num = cols[2].trim().padStart(2, '0');
                const name = cols[3].replace(/\s+/g, ''); // 이름 공백 제거
                const phone = cols[4] ? cols[4].trim() : "없음";
                
                const studentId = grade + cls + num; // 5자리 학번
                updates['settings/roster/' + studentId] = { name, phone, grade };
                count++;
            }
        });

        if(count === 0) return alert("유효한 학생 데이터가 없습니다. 양식을 확인해주세요.");

        // 2. 기존 자료 삭제 및 새 자료 전송 (컨펌)
        if(confirm(`기존 자료를 모두 삭제하고 새 명단(${count}명)으로 교체하시겠습니까?`)) {
            try {
                msg.style.color = "blue";
                msg.innerText = "⏳ 기존 명단 초기화 중...";
                
                // 기존 데이터 삭제
                await db.ref('settings/roster').remove();
                
                msg.innerText = `⏳ 새 데이터 전송 중 (0 / ${count})...`;
                
                // 10명씩 끊어서 전송 (안정성)
                const entries = Object.entries(updates);
                for(let i = 0; i < entries.length; i += 10) {
                    const chunk = Object.fromEntries(entries.slice(i, i + 10));
                    await db.ref().update(chunk);
                    msg.innerText = `⏳ 저장 중... (${Math.min(i + 10, count)} / ${count} 완료)`;
                }

                msg.style.color = "green";
                msg.innerText = `✅ 성공: 총 ${count}명의 명단이 새로 등록되었습니다.`;
                document.getElementById('roster-input').value = "";
                alert("교체 완료!");
            } catch (e) {
                msg.style.color = "red";
                msg.innerText = "❌ 오류 발생: " + e.message;
            }
        }
    }

    // 명단 불러오기
    function loadRoster() {
        const list = document.getElementById('roster-list');
        list.innerHTML = "<tr><td colspan='3'>로딩 중...</td></tr>";
        
        db.ref('settings/roster').once('value', snap => {
            const data = snap.val();
            list.innerHTML = "";
            if(!data) {
                list.innerHTML = "<tr><td colspan='3'>등록된 데이터가 없습니다.</td></tr>";
                return;
            }
            Object.keys(data).sort().forEach(id => {
                const s = data[id];
                list.innerHTML += `<tr><td>${id}</td><td>${s.name}</td><td>${s.phone}</td></tr>`;
            });
        });
    }

    // 표 검색 필터
    function filterTable() {
        const val = document.getElementById('search-input').value.toLowerCase();
        const rows = document.getElementById('roster-list').rows;
        for(let r of rows) {
            r.style.display = (r.innerText.toLowerCase().includes(val)) ? "" : "none";
        }
    }
</script>

</body>
</html>
