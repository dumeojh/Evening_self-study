<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교사용 대시보드</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebase_config.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background: #f0f2f5; }
        .grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { width: 120px; padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .정상입실 { border-left: 5px solid #4CAF50; }
        .지각 { border-left: 5px solid #FF9800; background: #fff3e0; }
    </style>
</head>
<body>
    <h1>📋 오늘의 출결 현황 (실시간)</h1>
    <div id="dashboard" class="grid">데이터를 불러오는 중...</div>

    <script>
        const today = new Date().toISOString().split('T')[0];
        
        db.ref('attendance/' + today).on('value', snapshot => {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            
            const data = snapshot.val();
            if (data) {
                for (let id in data) {
                    let info = data[id];
                    dashboard.innerHTML += `
                        <div class="card ${info.status}">
                            <div style="font-size:1.2em">${info.name}</div>
                            <div style="color:gray; font-size:0.8em; margin-top:5px;">${info.status}</div>
                            <div style="font-size:0.8em;">${info.time}</div>
                        </div>
                    `;
                }
            } else {
                dashboard.innerHTML = '출석 데이터가 없습니다.';
            }
        });
    </script>
</body>
</html>
